version: '3.8'

services:
  # FastAPI Backend with In-Memory Storage (Cloud Run optimized)
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY}
      - LOG_LEVEL=INFO
      - PORT=8000
    networks:
      - business-validator-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    volumes:
      - ./UI_Pages:/app/UI_Pages
      - ./agent.py:/app/agent.py
      - ./models.py:/app/models.py

  # Optional Redis for conversation memory (for local development with persistence)
  # Uncomment below if you want to use Redis instead of in-memory storage
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - business-validator-network
  #   volumes:
  #     - redis-data:/data
  #   command: redis-server --appendonly yes
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 3

networks:
  business-validator-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
